<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria — Product Lister</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      text-align: center;
      padding: 2rem 3rem;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #161616;
    }
    h1 { font-size: 1.8rem; margin: 0 0 0.5rem; }
    p  { color: #888; margin: 0; font-size: 0.95rem; }
    .status {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.3rem 0.8rem;
      background: #1a3a1a;
      color: #4caf50;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Aria</h1>
    <p>Scheduled product pipeline — runs 4× daily.</p>
    <span class="status">● Active</span>
  </div>
</body>
</html>
